<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goodbye &mdash; SocialNet Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--clr-navy-deeper) 0%, var(--clr-navy) 60%, #264e96 100%);
      overflow: hidden;
    }

    .exit-card {
      background: var(--clr-panel-bg);
      border: 1px solid var(--clr-panel-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-hover);
      padding: 2.5rem 2.75rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }

    .exit-icon {
      font-size: 3rem;
      color: var(--clr-blue);
      margin-bottom: 1rem;
      line-height: 1;
    }

    .exit-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--clr-text);
      margin-bottom: 0.4rem;
    }

    .exit-sub {
      font-size: 0.85rem;
      color: var(--clr-text-muted);
      margin-bottom: 1.75rem;
    }

    .btn-return {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--clr-blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.5rem 1.2rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.16s;
    }
    .btn-return:hover {
      background: var(--clr-blue-mid);
      color: #fff;
    }

    .exit-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--clr-text-faint);
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>

  <div class="exit-card">
    <div class="exit-icon">
      <i class="bi bi-people-fill"></i>
    </div>
    <h1 class="exit-title">You've exited.</h1>
    <p class="exit-sub">Thanks for using SocialNet Manager.<br>Your changes have been saved.</p>
    <a href="index.html" class="btn-return">
      <i class="bi bi-arrow-left"></i> Return to App
    </a>
    <p class="exit-label">LBYCPG3 &middot; Activity 7</p>
  </div>

</body>
</html>
